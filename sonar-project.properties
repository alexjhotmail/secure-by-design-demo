# sonar-project.properties
# Configuration for SonarCloud free code quality and security scanning
#
# SETUP STEPS (do once, takes ~15 minutes):
# 1. Go to https://sonarcloud.io and sign in with your GitHub account
# 2. Click "+" → "Analyze new project" → select this repository
# 3. SonarCloud will detect this file automatically
# 4. Once connected, copy the badge URLs from your project dashboard
#    into the README (replace the placeholder badge URLs)
#
# The badge shows employers your current security and quality rating
# without them needing to log in anywhere.

# Replace with your SonarCloud organisation (your GitHub username by default)
sonar.organization=YOUR_GITHUB_USERNAME

# Replace with your project key (shown in SonarCloud after setup)
sonar.projectKey=secure-by-design-demo

sonar.projectName=Secure by Design Demo
sonar.projectVersion=1.0

sonar.sources=.
sonar.exclusions=**/__pycache__/**,**/*.pyc,**/venv/**,**/env/**

sonar.python.version=3.10
